version: "3.8"

services:
  # Main API service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skin-cancer-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=efficientnet
      - CHECKPOINT_PATH=models/efficientnet_best.pth
    volumes:
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - monitoring

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: skin-cancer-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - monitoring

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:10.1.0
    container_name: skin-cancer-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./dashboards/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring

  # MLflow tracking server
  mlflow:
    image: python:3.12-slim
    container_name: skin-cancer-mlflow
    ports:
      - "5000:5000"
    command: >
      bash -c "pip install mlflow && mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts"
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped
    networks:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:
  mlflow_data:

networks:
  monitoring:
    driver: bridge
