name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Check formatting (Black)
        run: black --check --diff src/ tests/

      - name: Check imports (isort)
        run: isort --check-only --diff src/ tests/

      - name: Lint (Flake8)
        run: flake8 src/ tests/ --max-line-length=100 --ignore=E203,W503

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/test_model.py tests/test_data_quality.py -v --tb=short

      - name: Run API tests
        run: pytest tests/test_api.py -v --tb=short

      - name: Run integration tests
        run: pytest tests/test_integration.py -v --tb=short

      - name: Run all tests with coverage
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t skin-cancer-api:${{ github.sha }} .

      - name: Test Docker health check
        run: |
          docker run -d --name test-api -p 8000:8000 skin-cancer-api:${{ github.sha }}
          sleep 30
          curl -f http://localhost:8000/health || exit 1
          docker stop test-api
          docker rm test-api

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install safety
        run: pip install safety

      - name: Check dependencies for vulnerabilities
        run: safety check -r requirements.txt || true
