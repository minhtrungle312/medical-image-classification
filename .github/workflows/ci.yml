name: CI/CD - Skin Cancer Classification

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  MLFLOW_TRACKING_URI: "http://localhost:5001"

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/test_model.py tests/test_api.py tests/test_data_quality.py \
            -v --tb=short \
            --junitxml=reports/test-results.xml \
            --cov=src --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: reports/

  docker:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (CI)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: skin-cancer-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker Compose starts
        run: |
          docker compose up -d --build
          sleep 30
          curl -f http://localhost:8000/health || exit 1
          docker compose down

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install safety bandit

      - name: Check dependencies (safety)
        run: safety check -r requirements.txt || true

      - name: Static security analysis (bandit)
        run: bandit -r src/ -ll --format json -o reports/bandit-report.json || true

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: reports/bandit-report.json

  cd:
    name: CD - Build & Release (Mock Deploy)
    runs-on: ubuntu-latest
    needs: [test, docker, security]

    # Chỉ chạy CD khi push vào main hoặc develop (không chạy cho PR)
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "tag=prod" >> $GITHUB_OUTPUT
          else
            echo "tag=staging" >> $GITHUB_OUTPUT
          fi

      - name: Build & Push Docker Image (CD)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/skin-cancer-api:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ github.repository }}/skin-cancer-api:${{ github.sha }}

      - name: Simulate Deploy
        run: |
          echo "🚀 Deploying application..."
          echo "Environment: ${{ steps.vars.outputs.tag }}"
          echo "Image: ghcr.io/${{ github.repository }}/skin-cancer-api:${{ steps.vars.outputs.tag }}"
          echo "✅ Deploy success (mock)"